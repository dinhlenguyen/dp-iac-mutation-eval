name: IaC Mutation Evaluation (LocalStack)

on:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      localstack:
        image: localstack/localstack:3.0.2
        ports:
          - 4566:4566
        env:
          SERVICES: ec2,iam,sts
          DEBUG: 1

    env:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1

    steps:
      # -----------------------------
      # CHECKOUT BASELINE (main)
      # -----------------------------
      - name: Checkout baseline (main)
        uses: actions/checkout@v4
        with:
          ref: main

      # -----------------------------
      # WAIT FOR LOCALSTACK
      # -----------------------------
      - name: Wait for LocalStack
        run: |
          for i in {1..30}; do
            curl -s http://localhost:4566/_localstack/health && echo "LocalStack ready" && exit 0
            echo "Waiting for LocalStack..."
            sleep 2
          done
          echo "LocalStack failed"
          exit 1

      # -----------------------------
      # TERRAFORM SETUP
      # -----------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      # -----------------------------
      # BASELINE APPLY (LANDING ZONE STATE)
      # -----------------------------
      - name: Terraform Apply Baseline
        working-directory: infra
        run: terraform apply -auto-approve

      # -----------------------------
      # SWITCH TO PR (AI MUTATION)
      # -----------------------------
      - name: Checkout PR branch (mutation)
        uses: actions/checkout@v4

      # -----------------------------
      # PLAN (DIFF AGAINST BASELINE)
      # -----------------------------
      - name: Terraform Plan
        working-directory: infra
        run: |
          terraform init
          terraform plan -out=tfplan
          terraform show -json tfplan > ../plan.json

      # -----------------------------
      # PYTHON EVALUATION
      # -----------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Evaluator
        run: |
          python3 evaluator.py plan.json scenarios/scenario.json