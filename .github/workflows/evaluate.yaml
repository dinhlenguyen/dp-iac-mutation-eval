name: IaC Mutation Evaluation (LocalStack)

on:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      localstack:
        image: localstack/localstack:3.0.2
        ports:
          - 4566:4566
        env:
          SERVICES: ec2,iam,sts
          DEBUG: 1

    env:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      AWS_PAGER: ""

    steps:
      # -----------------------------
      # CHECKOUT CODE (BASELINE)
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      # -----------------------------
      # WAIT FOR LOCALSTACK BASIC HEALTH
      # -----------------------------
      - name: Wait for LocalStack base health
        run: |
          for i in {1..30}; do
            curl -s http://localhost:4566/_localstack/health && echo "LocalStack responding" && break
            echo "Waiting for LocalStack..."
            sleep 2
          done

      # -----------------------------
      # WAIT FOR EC2 READINESS (CRITICAL FIX)
      # -----------------------------
      - name: Wait for EC2 service readiness
        run: |
          for i in {1..40}; do
            STATUS=$(curl -s http://localhost:4566/_localstack/health | jq -r '.services.ec2')

            echo "EC2 status: $STATUS"

            if [ "$STATUS" = "available" ]; then
              echo "EC2 is ready"
              exit 0
            fi

            sleep 2
          done

          echo "EC2 not ready"
          exit 1

      # -----------------------------
      # STABILIZATION BUFFER (IMPORTANT)
      # -----------------------------
      - name: Stabilization delay
        run: sleep 10

      # -----------------------------
      # SETUP TERRAFORM
      # -----------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # -----------------------------
      # TERRAFORM INIT
      # -----------------------------
      - name: Terraform Init
        working-directory: infra
        run: terraform init -reconfigure

      # -----------------------------
      # BASELINE APPLY (LANDING ZONE STATE)
      # -----------------------------
      - name: Terraform Apply Baseline
        working-directory: infra
        run: timeout 120 terraform apply -auto-approve
      
      # -----------------------------
      # CHECKOUT CODE (PR)
      # -----------------------------
      - name: Checkout PR branch (mutation)
        uses: actions/checkout@v4
      
      # -----------------------------
      # TERRAFORM RE-INIT
      # -----------------------------
      - name: Re-init Terraform (keep state)
        working-directory: infra
        run: terraform init -reconfigure

      # -----------------------------
      # TERRAFORM PLAN → JSON
      # -----------------------------
      - name: Terraform Plan
        working-directory: infra
        run: |
          terraform plan -out=tfplan
          terraform show -json tfplan > ../plan.json

      # -----------------------------
      # SETUP PYTHON
      # -----------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -----------------------------
      # RUN EVALUATOR
      # -----------------------------
      - name: Run Evaluation
        run: |
          python3 evaluator.py plan.json scenarios/scenario.json