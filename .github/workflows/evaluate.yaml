name: IaC Mutation Evaluation (LocalStack)

on:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      localstack:
        image: localstack/localstack:3.0.2
        ports:
          - 4566:4566
        env:
          SERVICES: ec2,iam,sts
          DEBUG: 1

    env:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      AWS_PAGER: ""

    steps:

      # =========================================================
      # 1. CHECKOUT REPO (we will switch branches manually)
      # =========================================================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =========================================================
      # 2. WAIT FOR LOCALSTACK
      # =========================================================
      - name: Wait for LocalStack
        run: |
          for i in {1..40}; do
            if curl -s http://localhost:4566/_localstack/health | jq -e '.services.ec2 == "available"' >/dev/null; then
              echo "LocalStack ready"
              exit 0
            fi
            echo "Waiting for LocalStack..."
            sleep 2
          done
          echo "LocalStack not ready"
          exit 1

      - name: Stabilization buffer
        run: sleep 10

      # =========================================================
      # 3. SETUP TERRAFORM
      # =========================================================
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # =========================================================
      # 4. FORCE CLEAN BASELINE STATE (CRITICAL FIX)
      # =========================================================
      - name: Reset Terraform state (clean baseline)
        working-directory: infra
        run: |
          rm -rf .terraform
          rm -f terraform.tfstate terraform.tfstate.backup || true
          terraform init -reconfigure

      # =========================================================
      # 5. CHECKOUT MAIN (BASELINE DEFINITION)
      # =========================================================
      - name: Checkout MAIN branch (baseline)
        run: |
          git checkout main

      # =========================================================
      # 6. APPLY BASELINE (ALWAYS FRESH)
      # =========================================================
      - name: Apply baseline (clean state)
        working-directory: infra
        run: |
          terraform apply -auto-approve

      # =========================================================
      # 7. CHECKOUT PR BRANCH (MUTATION)
      # =========================================================
      - name: Checkout PR branch
        run: |
          git checkout ${{ github.head_ref || github.ref_name }}

      # =========================================================
      # 8. RE-INIT TERRAFORM (SAME STATE, SAME BACKEND)
      # =========================================================
      - name: Re-init Terraform
        working-directory: infra
        run: |
          terraform init -reconfigure

      # =========================================================
      # 9. PLAN MUTATION
      # =========================================================
      - name: Terraform Plan → JSON
        working-directory: infra
        run: |
          terraform plan -out=tfplan
          terraform show -json tfplan > ../plan.json

      # =========================================================
      # 10. RUN EVALUATOR
      # =========================================================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run evaluator
        run: |
          python3 evaluator.py plan.json scenarios/scenario.json